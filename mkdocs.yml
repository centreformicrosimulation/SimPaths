site_name: SimPaths Documentation
site_description: >-
  An open-source microsimulation framework for modelling individual
  and household life course events across the UK and Europe.
site_url: https://centreformicrosimulation.github.io/SimPaths/
repo_url: https://github.com/centreformicrosimulation/SimPaths
repo_name: centreformicrosimulation/SimPaths

docs_dir: documentation

copyright: >-
  Copyright &copy; Matteo Richiardi, Patryk Bronka, Justin van de Ven —
  Centre for Microsimulation and Policy Analysis

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font: false
  logo: wiki/assets/images/logo.svg
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

extra_css:
  - wiki/assets/css/extra.css

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      toc_depth: 3
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/centreformicrosimulation/SimPaths
      name: GitHub
    - icon: fontawesome/solid/globe
      link: https://www.microsimulation.ac.uk/
      name: Centre for Microsimulation and Policy Analysis

nav:
  - Home: wiki/index.md

  - Overview:
      - wiki/overview/index.md
      - Model Description: wiki/overview/model-description.md
      - Simulated Modules: wiki/overview/simulated-modules.md
      - Model Parameterisation: wiki/overview/parameterisation.md
      - Country Variants: wiki/overview/country-variants.md
      - How to Cite: wiki/overview/how-to-cite.md

  - Getting Started:
      - wiki/getting-started/index.md
      - Environment Setup: wiki/getting-started/environment-setup.md
      - Input Data:
          - wiki/getting-started/data/index.md
          - Initial Population (UK): wiki/getting-started/data/initial-population-uk.md
          - Tax-Benefit Donors (UK): wiki/getting-started/data/tax-benefit-donors-uk.md
      - Running Your First Simulation: wiki/getting-started/first-simulation.md
      - Video Tutorials: wiki/getting-started/video-tutorials.md

  - User Guide:
      - wiki/user-guide/index.md
      - Single Runs: wiki/user-guide/single-runs.md
      - Multiple Runs: wiki/user-guide/multiple-runs.md
      - Graphical User Interface: wiki/user-guide/gui.md
      - Modifying Tax-Benefit Settings: wiki/user-guide/tax-benefit-parameters.md
      - Uncertainty Analysis: wiki/user-guide/uncertainty-analysis.md

  - Developer Guide:
      - wiki/developer-guide/index.md
      - Working in GitHub: wiki/developer-guide/working-in-github.md
      - Repository Guide: wiki/developer-guide/repository-guide.md
      - JAS-mine Architecture:
          - wiki/developer-guide/jasmine/index.md
          - Project Structure: wiki/developer-guide/jasmine/project-structure.md
          - The Model and the Schedule: wiki/developer-guide/jasmine/model-and-schedule.md
          - The Start Class: wiki/developer-guide/jasmine/start-class.md
          - The MultiRun Class: wiki/developer-guide/jasmine/multirun-class.md
          - Updating JAS-mine: wiki/developer-guide/jasmine/updating-jasmine.md
      - SimPaths Internals:
          - wiki/developer-guide/internals/index.md
          - SimPaths API: wiki/developer-guide/internals/api.md
          - The SimPathsModel Class: wiki/developer-guide/internals/simpaths-model.md
          - Start Class Implementation: wiki/developer-guide/internals/start-class-implementation.md
          - MultiRun Implementation: wiki/developer-guide/internals/multirun-implementation.md
      - How-To Guides:
