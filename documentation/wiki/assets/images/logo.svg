<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="trail" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7ecef4" stop-opacity="0.75"/>
      <stop offset="55%"  stop-color="#bce4fa"/>
      <stop offset="100%" stop-color="white"/>
    </linearGradient>
  </defs>

  <!-- Origin node — appears instantly -->
  <circle cx="7" cy="19" r="3" fill="#7ecef4">
    <animate attributeName="opacity"
             values="0;1" keyTimes="0;1"
             dur="0.2s" begin="0s" fill="freeze"/>
  </circle>

  <!-- S-curve — draws upward from origin to destination -->
  <path d="M7 19 C7 21.5, 17 21.5, 17 16 C17 10.5, 7 13, 7 8 C7 2.5, 17 2.5, 17 5"
        stroke="url(#trail)" stroke-width="3.4" stroke-linecap="round" fill="none"
        stroke-dasharray="76" stroke-dashoffset="76">
    <animate attributeName="stroke-dashoffset"
             from="76" to="0"
             dur="1.4s" begin="0.15s"
             calcMode="spline" keySplines="0.22 0.1 0.22 1"
             fill="freeze"/>
  </path>

  <!-- Destination node — fades in as path completes -->
  <circle cx="17" cy="5" r="3" fill="white" opacity="0">
    <animate attributeName="opacity"
             values="0;0;1" keyTimes="0;0.87;1"
             dur="1.6s" begin="0.15s" fill="freeze"/>
  </circle>

</svg>
