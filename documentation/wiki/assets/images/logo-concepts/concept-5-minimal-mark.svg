<svg viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Concept 5: Minimal Path Mark
       The cleanest possible expression: a single elegant S-path
       with a subtle arrowhead suggesting forward progression through time.
       No nodes, no decoration — just the path itself. -->

  <defs>
    <linearGradient id="pathMin" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#1e3050"/>
      <stop offset="40%" stop-color="#2478b5"/>
      <stop offset="100%" stop-color="#4fb3f0"/>
    </linearGradient>
  </defs>

  <!-- Single S-curve path with tapered feel via varying-width simulation -->
  <!-- Main thick stroke -->
  <path d="M65 200 C65 230, 175 230, 175 165 C175 105, 65 120, 65 70 C65 20, 175 20, 175 45"
        stroke="url(#pathMin)" stroke-width="18" stroke-linecap="round" fill="none"/>

  <!-- Inner lighter stroke for depth -->
  <path d="M65 200 C65 230, 175 230, 175 165 C175 105, 65 120, 65 70 C65 20, 175 20, 175 45"
        stroke="white" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.15"/>

  <!-- Forward arrow at terminus -->
  <path d="M170 58 L180 42 L172 52" stroke="#4fb3f0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
