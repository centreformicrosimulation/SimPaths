<svg viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Concept 3: Geometric Ribbon S
       A clean, modern S formed by two interlocking arc segments
       with a subtle depth/ribbon effect. Minimal and professional. -->

  <defs>
    <linearGradient id="ribbon1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2478b5"/>
      <stop offset="100%" stop-color="#1e3050"/>
    </linearGradient>
    <linearGradient id="ribbon2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4fb3f0"/>
      <stop offset="100%" stop-color="#2478b5"/>
    </linearGradient>
  </defs>

  <!-- Back ribbon (darker) -->
  <path d="M155 35 C195 35, 195 95, 120 115 C45 135, 45 195, 85 205
           L75 215 C25 205, 25 130, 120 105 C215 80, 215 25, 145 25 Z"
        fill="url(#ribbon1)" opacity="0.85"/>

  <!-- Front ribbon (lighter) -->
  <path d="M85 205 C45 205, 45 145, 120 125 C195 105, 195 45, 155 35
           L165 25 C215 35, 215 110, 120 135 C25 160, 25 215, 95 215 Z"
        fill="url(#ribbon2)"/>
</svg>
