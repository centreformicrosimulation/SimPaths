<svg viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Concept 4: Population Flow S
       Multiple thin parallel lines flowing together in an S shape,
       representing individual life trajectories within a population.
       Lines converge and diverge — microsimulation at a glance. -->

  <defs>
    <linearGradient id="flow1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3050"/>
      <stop offset="100%" stop-color="#2478b5"/>
    </linearGradient>
    <linearGradient id="flow2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2478b5"/>
      <stop offset="100%" stop-color="#3b9ede"/>
    </linearGradient>
    <linearGradient id="flow3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b9ede"/>
      <stop offset="100%" stop-color="#4fb3f0"/>
    </linearGradient>
    <linearGradient id="flow4" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4fb3f0"/>
      <stop offset="100%" stop-color="#7ecef4"/>
    </linearGradient>
    <linearGradient id="flow5" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7ecef4"/>
      <stop offset="100%" stop-color="#bce4fa"/>
    </linearGradient>
  </defs>

  <!-- Individual life trajectory lines -->
  <path d="M55 210 C55 235, 185 240, 185 170 C185 105, 55 125, 55 70 C55 15, 185 15, 185 40"
        stroke="url(#flow1)" stroke-width="4.5" stroke-linecap="round" fill="none"/>

  <path d="M65 215 C65 238, 178 235, 178 168 C178 108, 62 122, 62 72 C62 22, 178 18, 178 48"
        stroke="url(#flow2)" stroke-width="4" stroke-linecap="round" fill="none"/>

  <path d="M75 210 C75 232, 170 228, 170 165 C170 112, 70 120, 70 75 C70 30, 170 25, 170 52"
        stroke="url(#flow3)" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <path d="M85 207 C85 226, 162 222, 162 163 C162 116, 78 118, 78 78 C78 38, 162 32, 162 55"
        stroke="url(#flow4)" stroke-width="3" stroke-linecap="round" fill="none"/>

  <path d="M95 204 C95 220, 155 218, 155 162 C155 120, 85 117, 85 80 C85 44, 155 38, 155 58"
        stroke="url(#flow5)" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Small origin dots -->
  <circle cx="55" cy="210" r="6" fill="#1e3050"/>
  <circle cx="65" cy="215" r="5" fill="#2478b5"/>
  <circle cx="75" cy="210" r="4.5" fill="#3b9ede"/>
  <circle cx="85" cy="207" r="4" fill="#4fb3f0"/>
  <circle cx="95" cy="204" r="3.5" fill="#7ecef4"/>

  <!-- Small destination dots -->
  <circle cx="185" cy="40" r="6" fill="#2478b5"/>
  <circle cx="178" cy="48" r="5" fill="#3b9ede"/>
  <circle cx="170" cy="52" r="4.5" fill="#4fb3f0"/>
  <circle cx="162" cy="55" r="4" fill="#7ecef4"/>
  <circle cx="155" cy="58" r="3.5" fill="#bce4fa"/>
</svg>
