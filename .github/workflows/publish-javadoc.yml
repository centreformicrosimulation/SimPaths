name: Publish Javadoc

on:
  push:
    branches:
      - develop  # Only publish when pushing to develop branch

jobs:
  publish-javadoc:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push to the javadoc branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 19
        uses: actions/setup-java@v3
        with:
          java-version: '19'
          distribution: 'temurin'
          cache: maven

      - name: Build (optional if Javadoc needs compiled sources)
        run: mvn -B compile --file pom.xml

      - name: Generate Javadoc
        run: mvn javadoc:javadoc --file pom.xml

      - name: Flatten Javadoc to temp directory
        run: |
          mkdir javadoc-temp
          cp -r target/site/apidocs/* javadoc-temp/
      
      - name: Deploy Javadoc to branch
        uses: MathieuSoysal/Javadoc-publisher.yml@v3.0.2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          javadoc-branch: javadoc
          java-version: 19
          target-folder: javadoc-temp
          project: maven

